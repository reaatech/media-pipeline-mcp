#     paths:
#       - 'packages/**'
#       - 'Dockerfile'
#       - '.github/workflows/deploy-aws.yml'
#       - 'infra/aws/**'
on:
  workflow_dispatch:

env:
  REGION: us-east-1
  ECR_REPOSITORY: media-pipeline-mcp
  ECS_SERVICE: media-pipeline-mcp-prod-service
  ECS_CLUSTER: media-pipeline-mcp-prod-cluster
  TASK_DEFINITION: media-pipeline-mcp-prod-task

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run build
        run: pnpm build

      - name: Run type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run npm audit
        run: pnpm audit --audit-level=high

      - name: Generate SBOM
        run: pnpm sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Setup Terraform
        if: github.event_name == 'push'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.7.0

      - name: Terraform Validate AWS
        if: github.event_name == 'push'
        working-directory: infra/aws
        run: |
          terraform init -backend=false
          terraform validate
          terraform plan -out=tfplan

      - name: Upload Terraform plan
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: tf-plan-aws
          path: infra/aws/tfplan

  security-scan:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

