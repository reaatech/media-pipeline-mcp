services:
  media-pipeline-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - LOG_LEVEL=debug
      - STORAGE_TYPE=local
      - STORAGE_PATH=/app/artifacts
      - STORAGE_TTL=86400
      # Provider API keys (set via .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
    volumes:
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  # Optional: MinIO for S3-compatible local storage
  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-52Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    profiles:
      - s3

  # Optional: Create MinIO bucket on startup
  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-45-29Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/media-artifacts;
      mc anonymous set download myminio/media-artifacts;
      exit 0;
      "
    profiles:
      - s3

volumes:
  minio_data:
